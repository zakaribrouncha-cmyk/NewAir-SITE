<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Joueurs NewAir</title><style>body{margin:0;background:#000;color:white;font-family:Arial}.wrap{max-width:1000px;margin:0 auto;padding:40px 20px}.row{display:flex;align-items:center;gap:14px;border:1px solid rgba(95,150,214,.35);border-radius:14px;padding:14px;margin:10px 0;background:#050b16}.row img{width:48px;height:48px;border-radius:999px;object-fit:cover}.row div{flex:1}.btn{padding:10px 12px;border:1px solid #1e4f8f;border-radius:9px;background:#0b2a5b;color:white;cursor:pointer}.bad{border-color:#7f1d1d;background:#451515}a{color:#9fc3ef}</style></head><body><main class="wrap"><h1>Joueurs liés NewAir</h1><p><a href="/admin/">Retour admin</a></p><section id="list">Chargement...</section></main><script>function esc(v){return String(v||'').replace(/[<>&]/g,function(m){return {'<':'&lt;','>':'&gt;','&':'&amp;'}[m]})}function setRole(id,status){fetch('/api/users/status',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({discord_id:id,status:status})}).then(load)}function load(){fetch('/api/users',{cache:'no-store'}).then(function(r){if(r.status===401){location.href='/api/dis'+'cord/login?mode=admin&next=/admin/joueurs/';return null}return r.json()}).then(function(j){if(!j||!j.ok)return;var users=j.users||[];list.innerHTML=users.length?users.map(function(u){return '<div class="row"><img src="'+esc(u.avatar||'/assets/newair-logo-swirl.png')+'"><div><b>'+esc(u.global_name||u.username)+'</b><br><small>'+esc(u.discord_id)+' · '+esc(u.status)+'</small></div><button class="btn" onclick="setRole(\''+esc(u.discord_id)+'\',\'accepted\')">Accepter</button><button class="btn bad" onclick="setRole(\''+esc(u.discord_id)+'\',\'rejected\')">Refuser</button></div>'}).join(''):'Aucun joueur lié.'})}load()</script></body></html>
