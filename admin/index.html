<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Panel — NewAir</title>
  <link rel="stylesheet" href="/assets/styles-Db9UqP69.css">
  <link rel="stylesheet" href="/assets/newair-custom.css?v=night7">
  <style>
    *{box-sizing:border-box}body{margin:0;background:#000;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow-x:hidden}.bg-video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none}.shade{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:1;pointer-events:none}.page{position:relative;z-index:2;min-height:100vh}header.sitebar{position:fixed;top:0;left:0;right:0;height:74px;background:rgba(2,9,20,.55);backdrop-filter:blur(12px);z-index:50;border-bottom:1px solid rgba(255,255,255,.06)}nav{max-width:1180px;margin:0 auto;height:74px;display:flex;align-items:center;gap:30px;padding:0 16px}nav img.logo{height:34px;filter:drop-shadow(0 0 14px rgba(95,150,214,.7))}nav a{color:rgba(255,255,255,.75);text-decoration:none;font-size:11px;font-weight:800;letter-spacing:.30em;text-transform:uppercase}nav a:hover,nav a.active{color:white}.right{margin-left:auto;display:flex;align-items:center;gap:14px}.btn-top{border:1px solid rgba(95,150,214,.55);background:#0b2a5b;color:white;padding:10px 18px;border-radius:6px!important;box-shadow:0 0 20px rgba(95,150,214,.25)}.wrap{max-width:1180px;margin:0 auto;padding:112px 18px 52px}.head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px}.title{font-family:"Bebas Neue",Impact,sans-serif;font-size:clamp(38px,6vw,76px);line-height:.9;letter-spacing:.08em;margin:0}.card,.item,.empty,.login{border:1px solid rgba(95,150,214,.28);background:rgba(2,8,20,.78);backdrop-filter:blur(10px);border-radius:12px;padding:18px;box-shadow:0 0 34px rgba(11,42,91,.24)}.login{max-width:560px;margin:10vh auto;text-align:center;padding:34px 26px}.grid{display:grid;grid-template-columns:minmax(240px,320px) 1fr;gap:18px}.list{display:flex;flex-direction:column;gap:10px;max-height:72vh;overflow:auto}button,a{cursor:pointer}.item{width:100%;text-align:left;color:#fff}.item:hover,.item.active{border-color:rgba(95,150,214,.85);background:rgba(11,42,91,.26)}.item strong,.item small,.item em{display:block}.item small,.muted,.empty{color:rgba(255,255,255,.58)}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid rgba(95,150,214,.65);background:linear-gradient(135deg,#041024,#0b2a5b,#1e4f8f);color:#d9e9ff;border-radius:9px;padding:10px 14px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:12px;text-decoration:none}.btn.red{border-color:rgba(248,113,113,.55);background:rgba(127,29,29,.45);color:#fecaca}.btn.ghost{background:transparent;color:#9fc3ef}.btn.discord{background:linear-gradient(135deg,#182044,#5865f2,#1e4f8f)}.label{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:#5f96d6;margin:16px 0 6px}.actionbar{display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap;margin:12px 0 18px;padding:10px;border:1px solid rgba(95,150,214,.18);border-radius:10px;background:rgba(255,255,255,.03)}.badge{border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:8px 12px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.75)}.accepted{color:#86efac!important}.rejected{color:#fca5a5!important}.pending{color:#93c5fd!important}.badge.accepted{border-color:rgba(134,239,172,.4)}.badge.rejected{border-color:rgba(252,165,165,.4)}.badge.pending{border-color:rgba(147,197,253,.4)}pre{white-space:pre-wrap;font:inherit;color:rgba(255,255,255,.84);line-height:1.55;margin:0}.signature{max-width:360px;width:100%;background:#fff;border-radius:8px;padding:8px}.avatar{width:42px;height:42px;border-radius:999px;border:1px solid rgba(95,150,214,.5);background:#041024;object-fit:cover}.adminbox{display:flex;align-items:center;gap:10px;justify-content:flex-end;color:rgba(255,255,255,.75);font-size:12px}.error{border:1px solid rgba(248,113,113,.45);background:rgba(127,29,29,.26);border-radius:10px;padding:12px;margin:14px 0;color:#fecaca;text-align:left}code{background:rgba(255,255,255,.08);padding:2px 5px;border-radius:5px;color:#d9e9ff}@media(max-width:760px){nav{gap:12px}nav a{font-size:9px;letter-spacing:.16em}.right{display:none}.head{display:block}.grid{grid-template-columns:1fr}.wrap{padding-top:96px}.adminbox{justify-content:flex-start;margin-top:14px}}
  </style>
</head>
<body>
  <video class="bg-video" src="/video/bg.mp4" autoplay loop muted playsinline aria-hidden="true"></video>
  <div class="shade"></div>
  <div class="page">
    <header class="sitebar">
      <nav>
        <a href="/"><img class="logo" src="/assets/newair-logo-swirl.png" alt="NewAir"></a>
        <a href="/">ACCUEIL</a>
        <a href="/reglement">SERVEUR</a>
        <a href="/equipe/">ÉQUIPE</a>
        <a href="/admin/" class="active">ADMIN PANEL</a>
        <div class="right">
          <a href="https://discord.gg/UyzapQ2zap" target="_blank" rel="noreferrer">●</a>
          <a href="https://www.tiktok.com/@nhc0023" target="_blank" rel="noreferrer">♪</a>
          <a class="btn-top" href="https://discord.gg/UyzapQ2zap" target="_blank" rel="noreferrer">REJOINDRE →</a>
          <a href="/api/discord/logout">DÉCONNEXION</a>
        </div>
      </nav>
    </header>
    <main class="wrap" id="app"></main>
  </div>
  <script>
    const app=document.getElementById("app");
    const escapeHtml=value=>String(value||"Non renseigné").replace(/[<>&]/g,m=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[m]));
    let selected=null;
    let currentAdmin=null;
    function avatarUrl(admin){
      if(!admin)return "/assets/newair-logo-swirl.png";
      if(admin.avatar&&String(admin.avatar).startsWith("http"))return admin.avatar;
      if(admin.avatar&&admin.discord_id){const ext=String(admin.avatar).startsWith("a_")?"gif":"png";return `https://cdn.discordapp.com/avatars/${admin.discord_id}/${admin.avatar}.${ext}?size=80`}
      return admin.avatar||"/assets/newair-logo-swirl.png";
    }
    async function me(){try{const r=await fetch("/api/admin/me",{cache:"no-store",credentials:"include"});const j=await r.json();if(r.ok&&j.ok)return j;return j}catch{return{ok:false,error:"Impossible de contacter le serveur."}}}
    async function read(){const r=await fetch("/api/candidatures",{cache:"no-store",credentials:"include"});if(r.status===401){showLogin("Session expirée. Reconnecte-toi avec Discord.");throw new Error("unauthorized")}const j=await r.json();return Array.isArray(j.rows)?j.rows:[]}
    async function setStatus(id,status){await fetch("/api/candidatures/status",{method:"POST",credentials:"include",headers:{"content-type":"application/json"},body:JSON.stringify({id,status})});render(id)}
    function field(label,value){return `<div class="label">${label}</div><pre>${escapeHtml(value)}</pre>`}
    function details(x){if(!x)return `<p class="empty">Sélectionne une candidature.</p>`;return `<div><div class="label">Candidat</div><h2 style="font-size:30px;margin:0">${escapeHtml(`${x.rp_firstname||""} ${x.rp_lastname||""}`.trim()||"Sans nom")}</h2><p class="muted">${escapeHtml(x.email||"email non renseigné")} - ${escapeHtml(x.age||"?")} ans</p></div><div class="actionbar"><button class="btn" data-status="accepted">Accepter</button><button class="btn red" data-status="rejected">Refuser</button><span class="badge ${escapeHtml(x.status||"pending")}">${escapeHtml(x.status||"pending")}</span></div>${field("Discord",x.discord_tag||x.discord_username||x.discord_name)}${field("Heures GTA RP",x.hours_gtarp||"Non renseigné")}${field("Projet RP",x.rp_project)}${field("Background",x.rp_background)}${field("Motivations",x.motivation)}<div class="label">Signature</div>${x.signature?`<img class="signature" src="${x.signature}" alt="Signature">`:`<p class="empty">Aucune signature.</p>`}`}
    function discordErrorMessage(){const e=new URLSearchParams(location.search).get("error");if(e==="role")return"Ton compte Discord est bien connecté, mais tu n’as pas le rôle admin autorisé sur le serveur.";if(e==="discord")return"Erreur Discord. Vérifie le bot, le client secret, le serveur et les rôles sur Render.";if(e==="discord_state")return"Connexion Discord expirée. Réessaie.";return""}
    function showLogin(extra=""){const err=extra||discordErrorMessage();app.innerHTML=`<section class="login"><img src="/assets/newair-logo-swirl.png" alt="NewAir" style="height:74px;margin:0 auto 22px"><div class="label">Sécurité Discord</div><h1 class="title" style="font-size:54px">ADMIN NewAir</h1><p class="muted">Le panel admin est intégré au site. Seuls les membres avec le rôle Staff, Fondateur, SuperAdmin ou Haut gradé peuvent entrer.</p>${err?`<div class="error">${escapeHtml(err)}</div>`:""}<a class="btn discord" href="/api/discord/login?mode=admin&next=/admin/" style="margin-top:16px;width:100%">Se connecter avec Discord</a><a class="muted" href="/" style="display:block;margin-top:18px">Retour au site</a></section>`}
    async function render(id=selected){const rows=await read();selected=id||rows[0]?.id||null;const row=rows.find(x=>x.id===selected)||null;const name=currentAdmin?.global_name||currentAdmin?.username||"Admin Discord";app.innerHTML=`<header class="head"><div><div class="label">Panneau staff Discord</div><h1 class="title">ADMIN NewAir</h1><p class="muted">${rows.length} candidature(s) whitelist</p></div><div><div class="adminbox"><img class="avatar" src="${avatarUrl(currentAdmin)}" alt="Avatar"><span>Connecté : ${escapeHtml(name)} · ${escapeHtml(currentAdmin?.grade||"Staff")}</span></div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px"><button class="btn ghost" id="refreshBtn">Actualiser</button><button class="btn ghost" id="exportBtn">Export JSON</button><a class="btn red" href="/api/discord/logout">Déconnexion</a></div></div></header><section class="grid"><aside class="list">${rows.length?rows.map(x=>`<button class="item ${x.id===selected?"active":""}" data-id="${escapeHtml(x.id)}"><strong>${escapeHtml(`${x.rp_firstname||"Sans"} ${x.rp_lastname||"nom"}`)}</strong><small>${escapeHtml(x.discord_tag||x.discord_username||"Discord vide")} - ${new Date(x.created_at||Date.now()).toLocaleString("fr-FR")}</small><em class="${escapeHtml(x.status||"pending")}">${escapeHtml(x.status||"pending")}</em></button>`).join(""):`<div class="empty">Aucune candidature pour l'instant.</div>`}</aside><article class="card">${details(row)}</article></section>`;document.querySelectorAll("[data-id]").forEach(b=>b.onclick=()=>render(b.dataset.id));document.querySelectorAll("[data-status]").forEach(b=>b.onclick=()=>setStatus(row.id,b.dataset.status));document.getElementById("refreshBtn").onclick=()=>render(selected);document.getElementById("exportBtn").onclick=()=>{const blob=new Blob([JSON.stringify(rows,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="newair-candidatures.json";a.click()}}
    (async()=>{const auth=await me();if(!auth.ok){showLogin(auth.error);return}currentAdmin=auth.admin;render()})();
  </script>
  <script defer src="/assets/newair-custom.js?v=roles3" data-local-custom="newair"></script>
</body>
</html>
