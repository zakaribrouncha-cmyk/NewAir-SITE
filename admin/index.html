<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NewAir Admin</title>
  <link rel="stylesheet" href="/assets/styles-Db9UqP69.css">
  <link rel="stylesheet" href="/assets/newair-custom.css?v=night5">
  <style>
    body{background:#000;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .wrap{max-width:1200px;margin:0 auto;padding:32px 18px}
    .card{border:1px solid rgba(95,150,214,.32);background:rgba(2,8,20,.82);border-radius:10px;padding:18px;box-shadow:0 0 34px rgba(11,42,91,.25)}
    .row{display:grid;grid-template-columns:280px 1fr;gap:18px}
    .list{display:flex;flex-direction:column;gap:10px;max-height:70vh;overflow:auto}
    button,a{cursor:pointer}
    .item{width:100%;text-align:left;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);color:#fff;border-radius:8px;padding:12px}
    .item:hover,.item.active{border-color:rgba(95,150,214,.8);background:rgba(11,42,91,.22)}
    .btn{border:1px solid rgba(95,150,214,.65);background:linear-gradient(135deg,#041024,#0b2a5b,#1e4f8f);color:#d9e9ff;border-radius:8px;padding:10px 14px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;font-size:12px}
    .btn.red{border-color:rgba(248,113,113,.55);background:rgba(127,29,29,.45);color:#fecaca}
    .btn.ghost{background:transparent;color:#9fc3ef}
    .muted{color:rgba(255,255,255,.55)}
    .label{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:#5f96d6;margin:16px 0 6px}
    pre{white-space:pre-wrap;font:inherit;color:rgba(255,255,255,.82);line-height:1.55}
    input{width:100%;box-sizing:border-box;background:#020713;border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;padding:12px;margin:8px 0}
  </style>
</head>
<body>
  <main class="wrap" id="app"></main>
  <script>
    const KEY="newair-whitelist-candidatures";
    const ADMIN_EMAIL="admin@newair.fr";
    const ADMIN_PASS="newairadmin";
    const app=document.getElementById("app");
    const readLocal=()=>{try{return JSON.parse(localStorage.getItem(KEY)||"[]")}catch{return[]}};
    const writeLocal=v=>localStorage.setItem(KEY,JSON.stringify(v));
    let cache=[];
    async function read(){
      try{
        const r=await fetch("/api/candidatures",{cache:"no-store"});
        if(r.ok){const j=await r.json();cache=Array.isArray(j.rows)?j.rows:[];return cache}
      }catch{}
      cache=readLocal();
      return cache;
    }
    async function write(v){writeLocal(v);cache=v}
    let selected=null;
    function login(){
      app.innerHTML=`<section class="card" style="max-width:430px;margin:12vh auto">
        <img src="/assets/newair-logo-swirl.png" alt="NewAir" style="height:70px;margin:0 auto 22px">
        <h1 style="font-size:34px;letter-spacing:.12em;margin:0 0 8px">ADMIN NewAir</h1>
        <p class="muted">Connexion locale pour gérer les candidatures whitelist.</p>
        <form id="loginForm">
          <input id="email" type="email" placeholder="Email admin" required>
          <input id="pass" type="password" placeholder="Mot de passe" required>
          <button class="btn" style="width:100%;margin-top:8px">Connexion</button>
        </form>
        <a class="muted" href="/" style="display:block;text-align:center;margin-top:18px">Retour au site</a>
      </section>`;
      document.getElementById("loginForm").onsubmit=e=>{
        e.preventDefault();
        if(email.value===ADMIN_EMAIL && pass.value===ADMIN_PASS){sessionStorage.setItem("newair-admin","1");render()}
        else alert("Identifiants invalides");
      };
    }
    async function setStatus(id,status){
      const rows=await read();
      const row=rows.find(x=>x.id===id);
      if(row){
        row.status=status;row.reviewed_at=new Date().toISOString();await write(rows);
        try{await fetch("/api/candidatures/status",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id,status})})}catch{}
      }
      render(id);
    }
    async function render(id=selected){
      if(sessionStorage.getItem("newair-admin")!=="1") return login();
      const rows=await read();
      selected=id||rows[0]?.id||null;
      const row=rows.find(x=>x.id===selected);
      app.innerHTML=`<header style="display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px">
        <div><div class="label">Panneau staff local</div><h1 style="font-size:42px;letter-spacing:.1em;margin:0">WHITELIST NewAir</h1><p class="muted">${rows.length} candidature(s)</p></div>
        <div style="display:flex;gap:10px"><button class="btn ghost" id="exportBtn">Export JSON</button><button class="btn red" id="logoutBtn">Déconnexion</button></div>
      </header>
      <section class="row">
        <aside class="list">${rows.length?rows.map(x=>`<button class="item ${x.id===selected?"active":""}" data-id="${x.id}">
          <strong>${x.rp_firstname||"Sans"} ${x.rp_lastname||"nom"}</strong><br>
          <span class="muted">${x.discord_tag||"Discord vide"} - ${new Date(x.created_at).toLocaleString("fr-FR")}</span><br>
          <span style="color:${x.status==="accepted"?"#86efac":x.status==="rejected"?"#fca5a5":"#fde68a"}">${x.status||"pending"}</span>
        </button>`).join(""):`<div class="card muted">Aucune candidature pour l'instant.</div>`}</aside>
        <article class="card">${row?details(row):`<p class="muted">Sélectionne une candidature.</p>`}</article>
      </section>`;
      document.querySelectorAll("[data-id]").forEach(b=>b.onclick=()=>render(b.dataset.id));
      document.getElementById("logoutBtn").onclick=()=>{sessionStorage.removeItem("newair-admin");login()};
      document.getElementById("exportBtn").onclick=()=>{const blob=new Blob([JSON.stringify(rows,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="newair-candidatures.json";a.click()};
      document.querySelectorAll("[data-status]").forEach(b=>b.onclick=()=>setStatus(row.id,b.dataset.status));
    }
    function details(x){
      return `<div style="display:flex;align-items:start;justify-content:space-between;gap:14px">
        <div><div class="label">Candidat</div><h2 style="font-size:28px;margin:0">${x.rp_firstname||""} ${x.rp_lastname||""}</h2><p class="muted">${x.email||"email non renseigné"} - ${x.age||"?"} ans</p></div>
        <div style="display:flex;gap:8px"><button class="btn" data-status="accepted">Accepter</button><button class="btn red" data-status="rejected">Refuser</button></div>
      </div>
      ${field("Discord",x.discord_tag)}${field("Heures GTA RP",x.hours_gtarp||"Non renseigné")}
      ${field("Projet RP",x.rp_project)}${field("Background",x.rp_background)}${field("Motivations",x.motivation)}
      <div class="label">Signature</div>${x.signature?`<img src="${x.signature}" style="max-width:360px;background:#fff;border-radius:8px;padding:8px">`:"<p class='muted'>Aucune signature.</p>"}`;
    }
    function field(label,value){return `<div class="label">${label}</div><pre>${String(value||"Non renseigné").replace(/[<>&]/g,m=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[m]))}</pre>`}
    render();
  </script>
<script defer src="/assets/newair-custom.js?v=night5" data-local-custom="newair"></script></body>
</html>
