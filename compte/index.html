<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Compte NewAir</title><style>body{margin:0;background:#000;color:white;font-family:Arial;display:grid;place-items:center;min-height:100vh}.card{border:1px solid #1e4f8f;border-radius:18px;padding:35px;background:#050b16;text-align:center;min-width:340px}img{width:90px;height:90px;border-radius:999px;object-fit:cover}a{color:white}</style></head><body><section class="card"><img id="a" src="/assets/newair-logo-swirl.png"><h1 id="n">Compte NewAir</h1><p id="s">Chargement...</p><p><a href="/">Accueil</a> · <a href="/whitelist">Whitelist</a></p></section><script>fetch('/api/user/me',{cache:'no-store'}).then(function(r){if(!r.ok){location.href='/login/';return null}return r.json()}).then(function(j){if(!j||!j.ok)return;var u=j.user;document.getElementById('a').src=u.avatar||'/assets/newair-logo-swirl.png';document.getElementById('n').textContent=u.global_name||u.username||'Compte';document.getElementById('s').textContent='Statut : '+(u.status||'lié')})</script></body></html>
