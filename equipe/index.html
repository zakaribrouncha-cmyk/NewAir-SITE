<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Équipe NewAir</title><link rel="stylesheet" href="/assets/styles-Db9UqP69.css"><style>body{margin:0;background:#050712;color:#fff;font-family:Arial,Helvetica,sans-serif}.wrap{max-width:1180px;margin:0 auto;padding:110px 18px}.panel{border:1px solid rgba(95,150,214,.28);background:rgba(8,12,24,.82);border-radius:20px;overflow:hidden}.head{padding:28px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;gap:20px}.kicker{font-size:11px;letter-spacing:.4em;color:#9fc3ef;text-transform:uppercase}.title{font-family:Impact,Arial Black,sans-serif;font-size:60px;line-height:.9;margin:8px 0 12px}.title em{color:#9fc3ef}.desc{color:rgba(255,255,255,.7);max-width:720px}.badge{border:1px solid rgba(95,150,214,.35);border-radius:999px;padding:10px 14px;color:#d9e9ff;font-size:11px;letter-spacing:.18em;text-transform:uppercase;height:max-content}.content{padding:24px}.section{margin-bottom:30px}.section-title{font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#d9e9ff;margin:0 0 16px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:18px}.card{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.045);border-radius:14px;overflow:hidden}.avatar{height:170px;background:linear-gradient(135deg,#071a3d,#0b2a5b 55%,#5f96d6);display:grid;place-items:center;overflow:hidden}.avatar img{width:100%;height:100%;object-fit:cover}.avatar img.logo{width:78px;height:78px;object-fit:contain}.body{padding:13px}.name{font-weight:900;letter-spacing:.08em;margin:0 0 5px}.role{color:#9fc3ef;font-size:10px;letter-spacing:.24em;text-transform:uppercase;font-weight:800}.sub{color:rgba(255,255,255,.5);font-size:12px}.toplink{display:inline-flex;margin-bottom:16px;color:#9fc3ef;text-decoration:none;font-size:12px;letter-spacing:.18em;text-transform:uppercase}.empty{border:1px dashed rgba(255,255,255,.16);border-radius:14px;padding:24px;text-align:center;color:rgba(255,255,255,.5)}</style></head><body><main class="wrap"><a class="toplink" href="/">Retour accueil</a><section class="panel"><header class="head"><div><div class="kicker">Notre staff</div><h1 class="title">Équipe <em>NewAir</em></h1><p class="desc">Les membres sont classés automatiquement selon les rôles configurés sur le serveur.</p></div><div class="badge" id="memberCount">Chargement</div></header><div class="content" id="teamRoot"><div class="empty">Chargement équipe...</div></div></section></main><script>const roleOrder=['Fondateur','SuperAdmin','Staff','Admin','Modérateur','Membre'];const fallback={members:[{name:'Fondateur NewAir',role:'Fondateur',subtitle:'Direction',avatar:'/assets/newair-logo-swirl.png'},{name:'SuperAdmin NewAir',role:'SuperAdmin',subtitle:'Gestion serveur',avatar:'/assets/newair-logo-swirl.png'},{name:'Staff NewAir',role:'Staff',subtitle:'Support',avatar:'/assets/newair-logo-swirl.png'}]};const safe=v=>String(v||'').replace(/[<>&]/g,m=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[m]));function card(m){let img=m.avatar||'/assets/newair-logo-swirl.png';let cls=img.includes('newair-logo')?'logo':'';return `<article class="card"><div class="avatar"><img class="${cls}" src="${safe(img)}" alt="${safe(m.name)}"></div><div class="body"><h3 class="name">${safe(m.name)}</h3><div class="role">${safe(m.role||'Staff')}</div><p class="sub">${safe(m.subtitle||'Équipe NewAir')}</p></div></article>`}function render(data){let members=Array.isArray(data.members)?data.members:[];memberCount.textContent=members.length+' membre(s)';if(!members.length){teamRoot.innerHTML='<div class="empty">Aucun membre trouvé.</div>';return}teamRoot.innerHTML=roleOrder.map(role=>{let list=members.filter(m=>(m.role||'Staff').toLowerCase()===role.toLowerCase());return list.length?`<section class="section"><h2 class="section-title">${role}</h2><div class="grid">${list.map(card).join('')}</div></section>`:''}).join('')}async function load(){try{let api=await fetch('/api/team',{cache:'no-store'});if(api.ok){let data=await api.json();if(data.members&&data.members.length){render(data);return}}}catch(e){}try{let r=await fetch('/assets/newair-team.json?v=5',{cache:'no-store'});render(r.ok?await r.json():fallback)}catch(e){render(fallback)}}load();</script><script src="/assets/newair-custom.js?v=team5" defer></script></body></html>
