<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Équipe NewAir</title><link rel="stylesheet" href="/assets/styles-Db9UqP69.css"><style>body{margin:0;background:#061326;color:#fff;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}video.bg{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none}.shade{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:1;pointer-events:none}.page{position:relative;z-index:2;min-height:100vh}.wrap{max-width:1180px;margin:0 auto;padding:110px 18px 90px}.kicker{font-size:12px;letter-spacing:.45em;text-transform:uppercase;color:#9fc3ef;margin-bottom:10px}.title{font-family:Impact,Arial Black,sans-serif;font-size:70px;line-height:.9;margin:0 0 22px}.title em{color:#9fc3ef;font-family:Georgia,serif}.desc{max-width:720px;color:rgba(255,255,255,.72);font-size:15px;margin:0 0 34px}.section{margin:0 0 38px}.section-title{font-size:12px;letter-spacing:.55em;text-transform:uppercase;color:#fff;margin:0 0 16px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:18px}.card{border:1px solid rgba(255,255,255,.12);background:rgba(8,12,24,.78);border-radius:12px;overflow:hidden;box-shadow:0 18px 45px rgba(0,0,0,.28)}.avatar{height:160px;background:linear-gradient(135deg,#061d47,#0b2a5b 55%,#5f96d6);display:grid;place-items:center;overflow:hidden}.avatar img{width:100%;height:100%;object-fit:cover}.avatar img.logo{width:86px;height:86px;object-fit:contain;filter:drop-shadow(0 0 16px rgba(95,150,214,.75))}.body{padding:12px 13px}.name{font-weight:900;letter-spacing:.10em;margin:0 0 5px;font-size:14px;line-height:1.15}.role{color:#9fc3ef;font-size:9px;letter-spacing:.30em;text-transform:uppercase;font-weight:900}.sub{color:rgba(255,255,255,.50);font-size:11px;line-height:1.25;margin:6px 0 0}.empty{border:1px dashed rgba(255,255,255,.20);border-radius:10px;padding:20px;color:rgba(255,255,255,.5)}header{position:fixed;top:0;left:0;right:0;height:70px;background:rgba(2,9,20,.50);backdrop-filter:blur(10px);z-index:10;border-bottom:1px solid rgba(255,255,255,.05)}nav{max-width:1180px;margin:0 auto;height:70px;display:flex;align-items:center;gap:34px;padding:0 14px}nav img{height:34px}nav a{color:rgba(255,255,255,.75);text-decoration:none;font-size:11px;font-weight:800;letter-spacing:.32em}nav a.active{color:#fff}.right{margin-left:auto;display:flex;align-items:center;gap:14px}.btn{border:1px solid rgba(95,150,214,.55);background:#0b2a5b;color:white;padding:10px 18px;border-radius:4px}@media(max-width:760px){.wrap{padding-top:88px}.title{font-size:48px}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}nav{gap:14px}nav a{font-size:9px;letter-spacing:.18em}.right{display:none}}</style></head><body><video class="bg" src="/video/bg.mp4" autoplay loop muted playsinline aria-hidden="true"></video><div class="shade"></div><div class="page"><header><nav><a href="/"><img src="/assets/newair-logo-swirl.png" alt="NewAir"></a><a href="/">ACCUEIL</a><a href="/reglement">SERVEUR</a><a class="active" href="/equipe/">ÉQUIPE</a><a href="/compte">COMPTE</a><div class="right"><a href="https://discord.gg/UyzapQ2zap">●</a><a href="https://www.tiktok.com/@nhc0023">♪</a><a class="btn" href="https://discord.gg/UyzapQ2zap">REJOINDRE →</a><a href="/login">CONNEXION</a></div></nav></header><main class="wrap"><div class="kicker">Notre staff</div><h1 class="title">Équipe <em>NewAir</em></h1><p class="desc">Les membres sont affichés directement dans la page équipe, sans panel séparé. Le classement suit les rôles Discord configurés.</p><section id="teamRoot"><div class="empty">Chargement équipe...</div></section></main></div><script>const roleOrder=['Fondateur','SuperAdmin','Staff','Admin','Modérateur','Membre'];const fallback={members:[{name:'Fondateur NewAir',role:'Fondateur',subtitle:'Direction du serveur',avatar:'/assets/newair-logo-swirl.png'},{name:'SuperAdmin NewAir',role:'SuperAdmin',subtitle:'Gestion staff et serveur',avatar:'/assets/newair-logo-swirl.png'},{name:'Staff NewAir',role:'Staff',subtitle:'Support et modération',avatar:'/assets/newair-logo-swirl.png'}]};const safe=v=>String(v||'').replace(/[<>&]/g,m=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[m]));function card(m){let img=m.avatar||'/assets/newair-logo-swirl.png';let cls=img.includes('newair-logo')?'logo':'';return `<article class="card"><div class="avatar"><img class="${cls}" src="${safe(img)}" alt="${safe(m.name)}"></div><div class="body"><h3 class="name">${safe(m.name)}</h3><div class="role">${safe(m.role||'Staff')}</div><p class="sub">${safe(m.subtitle||'Équipe NewAir')}</p></div></article>`}function render(data){let members=Array.isArray(data.members)?data.members:[];if(!members.length){teamRoot.innerHTML='<div class="empty">Aucun membre trouvé.</div>';return}teamRoot.innerHTML=roleOrder.map(role=>{let list=members.filter(m=>(m.role||'Staff').toLowerCase()===role.toLowerCase());return list.length?`<section class="section"><h2 class="section-title">${role}</h2><div class="grid">${list.map(card).join('')}</div></section>`:''}).join('')}async function load(){try{let api=await fetch('/api/team',{cache:'no-store'});if(api.ok){let data=await api.json();if(data.members&&data.members.length){render(data);return}}}catch(e){}try{let r=await fetch('/assets/newair-team.json?v=staffpage',{cache:'no-store'});render(r.ok?await r.json():fallback)}catch(e){render(fallback)}}load();</script></body></html>
